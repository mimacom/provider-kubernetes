name: Publish Provider Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use while publishing the package (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.24'
        required: false

jobs:
  publish-provider-package:
    # Only mima-release-* branches may publish/release the provider package;
    # release-fork.yml dispatches this workflow against that branch.
    if: startsWith(github.ref, 'refs/heads/mima-release-')
    uses: crossplane-contrib/provider-workflows/.github/workflows/publish-provider-non-family.yml@451c4dc6ad3691b0a702a997a0ac24e8bbc8bbaa # main
    with:
      registry_org: mimacom
      repository: provider-kubernetes
      version: ${{ github.event.inputs.version }}
      go-version: ${{ github.event.inputs.go-version }}
      cleanup-disk: true
    secrets:
      GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
      XPKG_MIRROR_TOKEN: ${{ secrets.XPKG_TOKEN }}
      XPKG_MIRROR_ACCESS_ID: ${{ secrets.XPKG_ACCESS_ID }}

  sign:
    name: Sign OCI Package
    needs: [publish-provider-package]
    runs-on: ubuntu-latest
    if: github.event.inputs.version != '' && startsWith(github.ref, 'refs/heads/mima-release-')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3

      - name: Sign OCI Package
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_SIGNING_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          cosign sign \
            --key env://COSIGN_PRIVATE_KEY \
            --tlog-upload=false \
            --yes \
            ghcr.io/mimacom/${{ github.event.repository.name }}:${{ github.event.inputs.version }}

      # Publish the GitHub Release carrying the cosign public key so it can be
      # verified (air-gapped, no Rekor). Create the release if it does not exist
      # yet, otherwise just (re)attach the key. crossplane-gitops/release-fork.yml
      # validates this signature after the dispatch completes.
      - name: Publish GitHub Release with cosign.pub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if gh release view "${VERSION}" --repo ${{ github.repository }} >/dev/null 2>&1; then
            gh release upload "${VERSION}" release/cosign.pub \
              --repo ${{ github.repository }} --clobber
          else
            gh release create "${VERSION}" release/cosign.pub \
              --repo  ${{ github.repository }} \
              --title "${VERSION}" \
              --notes "mimacom signed release ${VERSION}."
          fi

